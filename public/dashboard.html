<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1B5E20">
  <title>AL FAREED — لوحة التحكم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/shared.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>

  <nav class="app-nav">
    <a href="/"          class="nav-btn inactive">📝 تسجيل نقص</a>
    <a href="/dashboard" class="nav-btn active">📊 الداشبورد</a>
    <button id="notifBtn" class="notif-btn">🔔</button>
  </nav>

  <!-- Sticky Header -->
  <header class="dash-header">
    <div class="header-brand">
      <img src="/assets/farid.webp" alt="AL FAREED" class="header-logo-img">
    </div>
    <h1 class="page-title">لوحة التحكم — النواقص</h1>
    <div class="live-clock" id="clock">--:--:--</div>
  </header>

  <main class="dash-main">

    <!-- Stats (clickable filters) -->
    <section class="stats-grid" id="statsGrid">

      <button class="stat-card stat-today" data-filter="all">
        <div class="stat-bg-icon">📋</div>
        <div class="stat-number" id="statTotal">0</div>
        <div class="stat-label">الإجمالي</div>
        <div class="stat-sublabel">جميع البلاغات</div>
      </button>

      <button class="stat-card stat-urgent" data-filter="urgent">
        <div class="stat-bg-icon">⚡</div>
        <div class="stat-number" id="statUrgent">0</div>
        <div class="stat-label">عاجل مفتوح</div>
        <div class="stat-sublabel">تحتاج تدخل فوري</div>
      </button>

      <button class="stat-card stat-normal" data-filter="normal">
        <div class="stat-bg-icon">📦</div>
        <div class="stat-number" id="statNormal">0</div>
        <div class="stat-label">عادي مفتوح</div>
        <div class="stat-sublabel">قيد المتابعة</div>
      </button>

      <button class="stat-card stat-resolved" data-filter="resolved">
        <div class="stat-bg-icon">✅</div>
        <div class="stat-number" id="statResolved">0</div>
        <div class="stat-label">تم الحل</div>
        <div class="stat-sublabel">إجمالي المحلولة</div>
      </button>

      <button class="stat-card stat-inspected" data-filter="inspected">
        <div class="stat-bg-icon">🔍</div>
        <div class="stat-number" id="statInspected">0</div>
        <div class="stat-label">تم الفحص</div>
        <div class="stat-sublabel">جرى التحقق منها</div>
      </button>

      <button class="stat-card stat-closed" data-filter="closed">
        <div class="stat-bg-icon">⛔</div>
        <div class="stat-number" id="statClosed">0</div>
        <div class="stat-label">مغلق</div>
        <div class="stat-sublabel">تم إغلاقها</div>
      </button>

    </section>

    <!-- Report List -->
    <section class="report-list" id="reportList">
      <div class="loading-state" id="loadingState">
        <span class="spinner dash-spinner"></span>
        <p>جارٍ التحميل...</p>
      </div>
    </section>

  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" hidden>
    <div class="lightbox-backdrop" id="lightboxBackdrop"></div>
    <img class="lightbox-img" id="lightboxImg" src="" alt="صورة المنتج">
    <div class="lightbox-actions">
      <button class="lightbox-close" id="lightboxClose" aria-label="إغلاق">✕</button>
      <a class="lightbox-download" id="lightboxDownload" download aria-label="تنزيل الصورة">⬇</a>
    </div>
  </div>

  <script src="/js/dashboard.js"></script>
  <script src="/js/notifications.js"></script>
</body>
</html>
